repos:
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: []
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: no-commit-to-branch
        stages: [pre-commit]
      - id: check-executables-have-shebangs
        stages: [pre-commit]
      - id: check-merge-conflict
        stages: [pre-commit]
      - id: check-toml
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-case-conflict
        stages: [pre-commit]
      - id: check-symlinks
        stages: [pre-commit]
  - repo: https://github.com/Lucas-C/pre-commit-hooks-markup
    rev: v1.0.1
    hooks:
      - id: rst-linter
        stages: [pre-commit]
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Prettier
        files: \.(yml|yaml|json|md)$
        args:
          - --tab-width=2
          - --use-tabs=false
          - --cache-location=.prettier_cache
        stages: [pre-commit]
  - repo: https://github.com/Lucas-C/pre-commit-hooks
    rev: v1.5.5
    hooks:
      - id: forbid-crlf
        stages: [pre-commit]
      - id: remove-crlf
        stages: [pre-commit]
      - id: forbid-tabs
        stages: [pre-commit]
      - id: remove-tabs
        stages: [pre-commit]
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.10
    hooks:
      - id: actionlint
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: "poetry.lock|ui/pnpm-lock.yaml"
        args: [--baseline, .secrets.baseline]
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.9
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.11
    hooks:
      - id: ruff-check
        types_or: [python, pyi]
        args: [--fix]
        stages: [pre-commit]
      - id: ruff-format
        types_or: [python, pyi]
        stages: [pre-commit]
  - repo: https://github.com/PyCQA/bandit
    rev: 1.9.2
    hooks:
      - id: bandit
        stages: [pre-commit]
        args: ["--exclude", ".tox,.eggs,tests"]
  - repo: local # Local to get relevant dependencies
    hooks:
      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        stages: [pre-commit]
        args:
          - "--strict"
          - "--allow-untyped-decorators"
# >>> END AUTOGENERATED SECTION - config-ci-library
